<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatFlow — Real-Time Chat App</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f0f2f5;
      --sidebar-bg: #1a1d2e;
      --sidebar-text: #c4c8e8;
      --chat-bg: #ffffff;
      --bubble-me: #5b5ef4;
      --bubble-them: #f0f2f5;
      --text: #1a1d2e;
      --muted: #888;
      --online: #4ade80;
      --border: #e2e5f0;
      --input-bg: #f0f2f5;
      --accent: #5b5ef4;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      color: var(--sidebar-text);
    }

    .sidebar-header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .sidebar-header h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .sidebar-header p {
      font-size: 0.78rem;
      opacity: 0.5;
    }

    .sidebar-search {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .sidebar-search input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px 14px;
      color: #fff;
      font-family: inherit;
      font-size: 0.88rem;
      outline: none;
    }

    .sidebar-search input::placeholder { opacity: 0.4; }

    .section-label {
      padding: 14px 16px 6px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      opacity: 0.4;
    }

    .contact-list { overflow-y: auto; flex: 1; }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 10px;
      margin: 2px 8px;
    }

    .contact-item:hover { background: rgba(255,255,255,0.06); }
    .contact-item.active { background: rgba(91,94,244,0.25); }

    .avatar {
      position: relative;
      flex-shrink: 0;
    }

    .avatar-img {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
    }

    .online-dot {
      width: 10px; height: 10px;
      background: var(--online);
      border-radius: 50%;
      border: 2px solid var(--sidebar-bg);
      position: absolute;
      bottom: 2px; right: 2px;
    }

    .contact-info { flex: 1; min-width: 0; }

    .contact-name {
      font-size: 0.92rem;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .contact-preview {
      font-size: 0.78rem;
      opacity: 0.5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .contact-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .contact-time { font-size: 0.72rem; opacity: 0.4; }

    .unread-badge {
      background: var(--accent);
      color: #fff;
      border-radius: 99px;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 7px;
    }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .my-avatar {
      width: 38px; height: 38px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
    }

    .my-info { flex: 1; }
    .my-name { font-size: 0.88rem; font-weight: 600; color: #fff; }
    .my-status { font-size: 0.72rem; opacity: 0.5; }

    .settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    .settings-btn:hover { opacity: 1; }

    /* ===== MAIN CHAT ===== */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--chat-bg);
    }

    /* Chat header */
    .chat-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .chat-header-info { flex: 1; }
    .chat-header-name { font-size: 1rem; font-weight: 700; color: var(--text); }
    .chat-header-status { font-size: 0.8rem; color: var(--online); margin-top: 2px; }

    .header-actions { display: flex; gap: 8px; }

    .icon-btn {
      background: var(--input-bg);
      border: none;
      border-radius: 10px;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }
    .icon-btn:hover { background: #e2e5f0; }

    /* Messages area */
    .messages-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .date-divider {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      padding: 8px 0;
      position: relative;
    }

    .date-divider::before, .date-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 30%;
      height: 1px;
      background: var(--border);
    }
    .date-divider::before { left: 0; }
    .date-divider::after  { right: 0; }

    .msg-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      animation: msgIn 0.25s ease;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.me { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .msg-bubble {
      max-width: 65%;
      padding: 11px 16px;
      border-radius: 18px;
      font-size: 0.92rem;
      line-height: 1.5;
      position: relative;
    }

    .msg-row.them .msg-bubble {
      background: var(--bubble-them);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .msg-row.me .msg-bubble {
      background: var(--bubble-me);
      border-bottom-right-radius: 4px;
      color: #fff;
    }

    .msg-time {
      font-size: 0.7rem;
      margin-top: 4px;
      opacity: 0.5;
      text-align: right;
    }

    .msg-row.them .msg-time { text-align: left; padding-left: 42px; }
    .msg-row.me .msg-time { text-align: right; padding-right: 42px; }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 0;
    }

    .typing-dots {
      background: var(--bubble-them);
      border-radius: 18px;
      padding: 12px 18px;
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .dot {
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: dotBounce 1.2s ease infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    /* Input area */
    .input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .emoji-btn, .attach-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.3rem;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    .emoji-btn:hover, .attach-btn:hover { opacity: 1; }

    .msg-input {
      flex: 1;
      background: var(--input-bg);
      border: 1.5px solid transparent;
      border-radius: 12px;
      padding: 12px 16px;
      font-family: inherit;
      font-size: 0.92rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      resize: none;
      max-height: 120px;
    }

    .msg-input:focus { border-color: var(--accent); }
    .msg-input::placeholder { color: var(--muted); }

    .send-btn {
      width: 46px; height: 46px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      color: #fff;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #4042e0; transform: scale(1.05); }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-header">
    <h2>💬 ChatFlow</h2>
    <p>Real-Time Messaging</p>
  </div>
  <div class="sidebar-search">
    <input type="text" placeholder="🔍 Search conversations…" oninput="filterContacts(this.value)"/>
  </div>
  <div class="section-label">Recent Chats</div>
  <div class="contact-list" id="contact-list"></div>
  <div class="sidebar-footer">
    <div class="my-avatar">NW</div>
    <div class="my-info">
      <div class="my-name">Nishant Wagh</div>
      <div class="my-status">🟢 Online</div>
    </div>
    <button class="settings-btn">⚙️</button>
  </div>
</div>

<!-- MAIN CHAT -->
<div class="chat-main">
  <div class="chat-header">
    <div class="avatar">
      <div class="avatar-img" id="chat-avatar" style="background:#5b5ef4">S</div>
      <div class="online-dot"></div>
    </div>
    <div class="chat-header-info">
      <div class="chat-header-name" id="chat-name">Sara Johnson</div>
      <div class="chat-header-status" id="chat-status">● Online</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" title="Video Call">📹</button>
      <button class="icon-btn" title="Voice Call">📞</button>
      <button class="icon-btn" title="Search">🔍</button>
      <button class="icon-btn" title="More">⋯</button>
    </div>
  </div>

  <div class="messages-wrap" id="messages-wrap">
    <div class="date-divider">Today</div>
  </div>

  <div class="input-area">
    <button class="emoji-btn" onclick="pickEmoji()">😊</button>
    <button class="attach-btn">📎</button>
    <textarea class="msg-input" id="msg-input" placeholder="Type a message…" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  // ===== CONTACTS DATA =====
  const contacts = [
    { id: 1, name: "Sara Johnson",    initials: "SJ", color: "#5b5ef4", status: "online",  preview: "Sure, see you tomorrow!", time: "2m",  unread: 2 },
    { id: 2, name: "Alex Chen",       initials: "AC", color: "#f59e0b", status: "online",  preview: "That looks amazing!",       time: "8m",  unread: 0 },
    { id: 3, name: "Priya Sharma",    initials: "PS", color: "#ec4899", status: "offline", preview: "Can you review my PR?",     time: "1h",  unread: 5 },
    { id: 4, name: "Dev Team 🚀",     initials: "DT", color: "#10b981", status: "online",  preview: "Build passed ✅",           time: "2h",  unread: 0 },
    { id: 5, name: "Marcus Oliveira", initials: "MO", color: "#8b5cf6", status: "offline", preview: "Let's sync tomorrow",      time: "3h",  unread: 0 },
    { id: 6, name: "Yuki Tanaka",     initials: "YT", color: "#ef4444", status: "online",  preview: "Thanks for the help!",    time: "5h",  unread: 0 },
  ];

  // Chat histories per contact
  const histories = {
    1: [
      { me: false, text: "Hey Nishant! How's the internship going? 😊", time: "10:02 AM" },
      { me: true,  text: "It's going really well! Working on some cool frontend tasks.", time: "10:05 AM" },
      { me: false, text: "That's awesome! What are you building?", time: "10:06 AM" },
      { me: true,  text: "A quiz app, portfolio, chat app and e-learning platform UI. All 4 tasks for Codtech!", time: "10:08 AM" },
      { me: false, text: "Wow that sounds like a solid portfolio already 🔥", time: "10:09 AM" },
      { me: false, text: "Sure, see you tomorrow!", time: "10:45 AM" },
    ],
    2: [
      { me: false, text: "Hey! Saw your GitHub profile update.", time: "Yesterday" },
      { me: true,  text: "Yeah just pushed some new projects!", time: "Yesterday" },
      { me: false, text: "That looks amazing!", time: "Yesterday" },
    ],
    3: [
      { me: false, text: "Can you review my PR when you get a chance?", time: "2h ago" },
      { me: true,  text: "Sure, I'll check it right now!", time: "2h ago" },
      { me: false, text: "Thanks so much!", time: "2h ago" },
      { me: false, text: "Can you review my PR?", time: "1h ago" },
    ],
    4: [
      { me: false, text: "🚀 Deployment to staging is complete!", time: "2h ago" },
      { me: true,  text: "Great! Running tests now.", time: "2h ago" },
      { me: false, text: "Build passed ✅", time: "2h ago" },
    ],
    5: [
      { me: true,  text: "Are you free for a sync today?", time: "3h ago" },
      { me: false, text: "Let's sync tomorrow, I'm in meetings all day.", time: "3h ago" },
    ],
    6: [
      { me: false, text: "Thanks for the help with that bug!", time: "5h ago" },
      { me: true,  text: "No problem at all! 😊", time: "5h ago" },
    ],
  };

  let activeContact = contacts[0];

  // ===== RENDER CONTACTS =====
  function renderContacts(list) {
    const cl = document.getElementById('contact-list');
    cl.innerHTML = '';
    list.forEach(c => {
      const el = document.createElement('div');
      el.className = `contact-item${c.id === activeContact.id ? ' active' : ''}`;
      el.innerHTML = `
        <div class="avatar">
          <div class="avatar-img" style="background:${c.color}">${c.initials}</div>
          ${c.status === 'online' ? '<div class="online-dot"></div>' : ''}
        </div>
        <div class="contact-info">
          <div class="contact-name">${c.name}</div>
          <div class="contact-preview">${c.preview}</div>
        </div>
        <div class="contact-meta">
          <div class="contact-time">${c.time}</div>
          ${c.unread > 0 ? `<div class="unread-badge">${c.unread}</div>` : ''}
        </div>
      `;
      el.onclick = () => openChat(c);
      cl.appendChild(el);
    });
  }

  function filterContacts(q) {
    const filtered = contacts.filter(c => c.name.toLowerCase().includes(q.toLowerCase()));
    renderContacts(filtered);
  }

  // ===== OPEN CHAT =====
  function openChat(contact) {
    activeContact = contact;
    contact.unread = 0;
    renderContacts(contacts);
    document.getElementById('chat-name').textContent = contact.name;
    document.getElementById('chat-avatar').textContent = contact.initials;
    document.getElementById('chat-avatar').style.background = contact.color;
    document.getElementById('chat-status').textContent = contact.status === 'online' ? '● Online' : '○ Offline';
    document.getElementById('chat-status').style.color = contact.status === 'online' ? '#4ade80' : '#888';
    renderMessages();
  }

  // ===== RENDER MESSAGES =====
  function renderMessages() {
    const wrap = document.getElementById('messages-wrap');
    wrap.innerHTML = '<div class="date-divider">Today</div>';
    const msgs = histories[activeContact.id] || [];
    msgs.forEach(m => appendMessage(m.me, m.text, m.time, false));
    wrap.scrollTop = wrap.scrollHeight;
  }

  function appendMessage(isMe, text, timeStr, scroll = true) {
    const wrap = document.getElementById('messages-wrap');
    const contact = activeContact;

    const row = document.createElement('div');
    row.className = `msg-row ${isMe ? 'me' : 'them'}`;
    row.innerHTML = `
      ${!isMe ? `<div class="msg-avatar" style="background:${contact.color}">${contact.initials}</div>` : ''}
      <div class="msg-bubble">${escapeHtml(text)}</div>
      ${isMe  ? `<div class="msg-avatar" style="background:#5b5ef4">NW</div>` : ''}
    `;
    wrap.appendChild(row);

    const timeEl = document.createElement('div');
    timeEl.className = 'msg-time';
    timeEl.textContent = timeStr || nowTime();
    wrap.appendChild(timeEl);

    if (scroll) wrap.scrollTop = wrap.scrollHeight;
  }

  // ===== SEND MESSAGE =====
  function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text) return;

    const t = nowTime();
    // Add to history
    if (!histories[activeContact.id]) histories[activeContact.id] = [];
    histories[activeContact.id].push({ me: true, text, time: t });
    contacts.find(c => c.id === activeContact.id).preview = text;
    contacts.find(c => c.id === activeContact.id).time = 'now';

    appendMessage(true, text, t);
    input.value = '';
    input.style.height = 'auto';
    renderContacts(contacts);

    // Simulate reply after delay
    setTimeout(() => showTyping(), 1000);
    setTimeout(() => {
      hideTyping();
      const reply = getAutoReply(text);
      histories[activeContact.id].push({ me: false, text: reply, time: nowTime() });
      contacts.find(c => c.id === activeContact.id).preview = reply;
      renderContacts(contacts);
      appendMessage(false, reply, nowTime());
    }, 2500 + Math.random() * 1000);
  }

  // ===== TYPING INDICATOR =====
  let typingEl = null;
  function showTyping() {
    const wrap = document.getElementById('messages-wrap');
    typingEl = document.createElement('div');
    typingEl.className = 'msg-row them typing-row';
    typingEl.innerHTML = `
      <div class="msg-avatar" style="background:${activeContact.color}">${activeContact.initials}</div>
      <div class="typing-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    `;
    wrap.appendChild(typingEl);
    wrap.scrollTop = wrap.scrollHeight;
  }

  function hideTyping() {
    if (typingEl) { typingEl.remove(); typingEl = null; }
  }

  // ===== AUTO REPLIES =====
  const replies = [
    "That's really interesting! 😊", "I totally agree with you!", "Haha, yeah that's true 😄",
    "Let me check and get back to you!", "Sounds great! 👍", "Oh wow, didn't know that!",
    "Perfect, thanks for letting me know!", "Sure thing! 🎉", "Makes sense to me!",
    "I'll look into that right away.", "Good point! 🤔", "Absolutely, let's do it!",
    "Nice one! Keep it up 💪", "That's brilliant!", "Okay, talk soon! 👋"
  ];
  function getAutoReply(msg) {
    if (msg.toLowerCase().includes('hello') || msg.toLowerCase().includes('hi')) return "Hey there! 👋 How are you?";
    if (msg.toLowerCase().includes('bye')) return "Bye! Take care! 👋";
    if (msg.toLowerCase().includes('?')) return "Great question! Let me think about that… 🤔";
    return replies[Math.floor(Math.random() * replies.length)];
  }

  // ===== HELPERS =====
  function nowTime() {
    const d = new Date();
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function escapeHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  const emojis = ['😊','😂','❤️','🔥','👍','🎉','🤔','😍','👏','✅'];
  let emojiIdx = 0;
  function pickEmoji() {
    const input = document.getElementById('msg-input');
    input.value += emojis[emojiIdx++ % emojis.length];
    input.focus();
  }

  // ===== INIT =====
  renderContacts(contacts);
  renderMessages();
</script>
</body>
</html>
